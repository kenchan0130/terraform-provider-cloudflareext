name: CI

on:
  pull_request:
    paths:
      - "**.go"
      - go.mod
      - go.sum
      - version
      - aqua.yaml
      - .golangci.yml
      - ".github/workflows/ci.yml"
      - "examples/**"
      - "templates/**"

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs:
    name: Check to generate documents
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      AQUA_GLOBAL_CONFIG: ${{ github.workspace }}/aqua.yaml
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          # The shared Go cache can grow large enough to exhaust the hosted
          # runner while tfplugindocs compiles the provider schema.
          cache: false
      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.62.1
          aqua_opts: ""
      - name: Verify Terraform is available outside the repository
        working-directory: ${{ runner.temp }}
        run: terraform version
      - run: make generate/docs
        env:
          AQUA_CONFIG: ${{ github.workspace }}/aqua.yaml
      - name: Verify no changes to generated docs
        run: |
          git diff --compact-summary --exit-code -- docs/ || {
            git diff -- docs/
            echo "::error::Generated docs are out of date. Run 'make generate/docs' and commit the changes."
            exit 1
          }

  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: latest

  unit:
    name: Unit Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      AQUA_GLOBAL_CONFIG: ${{ github.workspace }}/aqua.yaml
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 2
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.62.1
          aqua_opts: ""
      - name: Verify Terraform is available outside the repository
        working-directory: ${{ runner.temp }}
        run: terraform version
      - run: go mod download
      - run: make test
        env:
          AQUA_CONFIG: ${{ github.workspace }}/aqua.yaml
      - name: Build provider when version changes
        run: |
          if git diff --quiet HEAD^1 HEAD -- version; then
            echo "version is unchanged; skipping provider build."
            exit 0
          fi
          make build

  summary:
    name: CI Summary
    if: always()
    needs:
      - docs
      - golangci-lint
      - unit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Check results
        run: |
          results=(
            "${{ needs.docs.result }}"
            "${{ needs.golangci-lint.result }}"
            "${{ needs.unit.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "One or more jobs failed or were cancelled."
              exit 1
            fi
          done
          echo "All jobs passed."
